<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeSentinel — Admin Login</title>
  <link rel="stylesheet" href="src/css/main.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-deep);
      overflow: hidden;
    }

    /* Grid BG */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow in center */
    .bg-glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%, rgba(0,245,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 420px;
      max-width: calc(100vw - 32px);
    }

    /* Header badge */
    .login-badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--red);
      letter-spacing: 0.3em;
      text-align: center;
      margin-bottom: var(--space-sm);
      display: block;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }

    /* Corner accents */
    .login-card::before, .login-card::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .login-card::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .login-card::after  { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    .login-icon {
      text-align: center;
      font-size: 3rem;
      margin-bottom: var(--space-md);
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 4px;
      letter-spacing: 0.1em;
    }

    .login-sub {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: var(--space-xl);
      letter-spacing: 0.15em;
    }

    .form-group {
      margin-bottom: var(--space-md);
    }

    .form-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--cyan);
      letter-spacing: 0.2em;
      display: block;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--border-bright);
      box-shadow: 0 0 0 2px var(--cyan-glow);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .login-btn {
      width: 100%;
      background: var(--cyan);
      color: var(--bg-deep);
      border: none;
      padding: 14px;
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      cursor: pointer;
      transition: var(--transition);
      border-radius: 2px;
      margin-top: var(--space-md);
    }

    .login-btn:hover:not(:disabled) {
      background: #fff;
      box-shadow: 0 0 30px var(--cyan-glow-lg);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .login-error {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--red);
      text-align: center;
      margin-top: var(--space-md);
      min-height: 20px;
    }

    .login-hint {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: var(--space-lg);
      min-height: 18px;
    }

    .login-footer {
      text-align: center;
      margin-top: var(--space-xl);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .login-footer a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .login-footer a:hover { color: var(--cyan); }

    /* Scanning line animation */
    .scan-line {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan-glow-lg), transparent);
      animation: scan 3s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0%   { top: 0%; }
      100% { top: 100%; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="login-wrap">
  <span class="login-badge">⚠ RESTRICTED ACCESS — AUTHORISED PERSONNEL ONLY</span>

  <div class="login-card" id="login-form-card">
    <div class="scan-line"></div>

    <div class="login-icon">🔐</div>
    <h1 class="login-title">ADMIN ACCESS</h1>
    <p class="login-sub">EDGESENTINEL SECURITY OPERATIONS CENTER</p>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="username">USERNAME</label>
        <input
          class="form-input"
          type="text"
          id="username"
          name="username"
          placeholder="Enter username"
          autocomplete="username"
          required
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">PASSWORD</label>
        <input
          class="form-input"
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          required
        />
      </div>

      <button type="submit" class="login-btn" id="login-btn">AUTHENTICATE</button>
    </form>

    <div class="login-error" id="login-error"></div>
    <div class="login-hint" id="hint-text"></div>
  </div>

  <div class="login-footer">
    <a href="index.html">← Back to Viewer</a>
    &nbsp;&nbsp;|&nbsp;&nbsp;
    Project KPR — Hackathon 2026
  </div>
</div>

<script type="module" src="src/js/login.js"></script>
</body>
</html>
